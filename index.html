<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover: 노치 대응(safe-area) 활성화 / maximum-scale=1: 입력칸 탭 시 iOS 자동 확대 방지 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>KBAS 영상장비대여실</title>
    <link rel="icon" type="image/png" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0F172A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KBAS Rental" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      /* safe area 변수 — 아래 스크립트가 JS로 측정한 실제 픽셀값으로 덮어씀 */
      :root {
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
      }
      /* 가로↔세로 회전 시 글자 자동 확대(iOS) 방지 */
      html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Noto Sans KR', sans-serif; background: #0F172A; }

      /* 노치(상단)·홈바(하단) 안전영역 확보 — 웹 브라우저에서는 값이 0이라 영향 없음 */
      #root {
        padding-top: var(--safe-top, 0px);
        padding-bottom: var(--safe-bottom, 0px);
        padding-left: env(safe-area-inset-left, 0px);
        padding-right: env(safe-area-inset-right, 0px);
        min-height: 100vh;
      }

      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      #splash img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
    </style>
    <script>
      /* safe area를 JS로 직접 측정해서 --safe-top / --safe-bottom에 "픽셀값"으로 주입.
         CSS env()가 환경에 따라 안 먹는 문제를 원천 우회한다. */
      (function () {
        function measure(prop) {
          try {
            var probe = document.createElement("div");
            probe.style.cssText = "position:fixed;left:0;top:0;width:0;height:0;padding-top:env(" + prop + ", 0px);visibility:hidden;";
            document.documentElement.appendChild(probe);
            var v = parseFloat(getComputedStyle(probe).paddingTop) || 0;
            probe.remove();
            return v;
          } catch (e) { return 0; }
        }
        function apply() {
          var top = measure("safe-area-inset-top");
          var bottom = measure("safe-area-inset-bottom");
          // 측정이 0인데 노치형 아이폰이면 기기 화면 높이에 따른 기본값 강제 적용
          var isiPhone = /iPhone/.test(navigator.userAgent);
          var h = Math.max(screen.width, screen.height);
          if (isiPhone && h >= 812) {
            if (top === 0)    top    = (h >= 852) ? 59 : 47;
            if (bottom === 0) bottom = 34;
          }
          var s = document.documentElement.style;
          s.setProperty("--safe-top",    top + "px");
          s.setProperty("--safe-bottom", bottom + "px");
        }
        apply();
        window.addEventListener("orientationchange", function () { setTimeout(apply, 300); });
      })();
    </script>
  </head>
  <body>
    <div id="splash">
      <img src="/onboarding.png" alt="" />
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('hide');
            setTimeout(() => splash.remove(), 400);
          }
        }, 800);
      });

      // 새 버전(서비스워커)이 활성화되면 한 번 자동 새로고침 → 항상 최신 화면 유지
      if ('serviceWorker' in navigator) {
        let reloaded = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (reloaded) return;
          reloaded = true;
          window.location.reload();
        });
      }
    </script>
  </body>
</html>
