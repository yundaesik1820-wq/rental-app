<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>KBAS 영상장비대여실</title>
    <link rel="icon" type="image/png" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0F172A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KBAS Rental" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; }
      body { font-family: 'Noto Sans KR', sans-serif; background: #0B0B0E; color: #ECECEE; overflow: hidden; overscroll-behavior: none; }

      /* 버튼 탭 모션 (네이티브 앱 느낌) */
      * { -webkit-tap-highlight-color: transparent; }
      button, [role="button"], .tap {
        touch-action: manipulation;
        transition: transform 0.13s cubic-bezier(0.2, 0, 0.2, 1);
        white-space: nowrap;
      }
      button:active, [role="button"]:active, .tap:active {
        transform: scale(0.96);
      }

      /* 스프링 누름 모션 (알림 아이콘·항목 등 — 통통 튀는 자연스러운 탭감) */
      .tap-spring {
        transition: transform 0.16s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .tap-spring:active {
        transform: scale(0.9);
      }

      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      #splash img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/splash.png" alt="" />
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('hide');
            setTimeout(() => splash.remove(), 400);
          }
        }, 800);
      });
    </script>
  </body>
</html>
