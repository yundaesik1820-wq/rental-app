<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- 모바일 웹 방문자 → 앱 스토어로 자동 안내 (네이티브 앱/데스크톱 제외) -->
    <script>
      (function () {
        try {
          // 1) 네이티브 앱(Capacitor) 내부에서는 절대 실행 안 함 (무한 리다이렉트 방지)
          if (window.Capacitor && typeof window.Capacitor.isNativePlatform === 'function' && window.Capacitor.isNativePlatform()) return;
          var host = location.hostname || '';
          if (host === 'localhost' || host === '127.0.0.1') return;   // 앱 웹뷰/로컬 개발
          var ua = navigator.userAgent || '';
          if (/Capacitor/i.test(ua)) return;                          // 혹시 모를 앱 웹뷰
          // 2) 우회: ?web=1 로 들어오면 이번 세션은 웹으로 계속 사용
          if (/[?&]web=1/.test(location.search)) { try { sessionStorage.setItem('kbas_no_store', '1'); } catch (e) {} }
          try { if (sessionStorage.getItem('kbas_no_store')) return; } catch (e) {}
          // 3) 모바일 브라우저만 스토어로 (데스크톱은 그대로 웹 사용)
          var url = null;
          if (/Android/i.test(ua)) url = 'https://play.google.com/store/apps/details?id=com.kbas.rental';
          else if (/iPhone|iPad|iPod/i.test(ua)) url = 'https://apps.apple.com/app/id6779502423';
          if (url) location.replace(url);
        } catch (e) {}
      })();
    </script>
    <title>KBAS 영상장비대여실</title>
    <link rel="icon" type="image/png" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0F172A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KBAS Rental" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; }
      body { font-family: 'Noto Sans KR', sans-serif; background: #0B0B0E; color: #ECECEE; overflow: hidden; overscroll-behavior: none; }

      /* 버튼 탭 모션 (네이티브 앱 느낌) */
      * { -webkit-tap-highlight-color: transparent; }
      button, [role="button"], .tap {
        touch-action: manipulation;
        transition: transform 0.13s cubic-bezier(0.2, 0, 0.2, 1);
        white-space: nowrap;
      }
      button:active, [role="button"]:active, .tap:active {
        transform: scale(0.96);
      }

      /* 스무스한 통통 누름 모션 (알림 아이콘·항목 등) */
      /* 뗄 때: 부드럽게 오버슈트하며 통 튀어오름 */
      .tap-spring {
        transition: transform 0.45s cubic-bezier(0.22, 1.2, 0.36, 1);
      }
      /* 누를 때: 빠르고 부드럽게 살짝 눌림 */
      .tap-spring:active {
        transform: scale(0.93);
        transition: transform 0.12s cubic-bezier(0.33, 0, 0.3, 1);
      }

      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      #splash img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/splash.png" alt="" />
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('hide');
            setTimeout(() => splash.remove(), 400);
          }
        }, 800);
      });
    </script>
  </body>
</html>
